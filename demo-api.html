<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo API MindAudit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin-top: 10px;
        }
        
        .status.online {
            background: #10b981;
        }
        
        .status.offline {
            background: #ef4444;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 600;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .success {
            color: #10b981;
            font-weight: bold;
        }
        
        .error {
            color: #ef4444;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .user-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .user-item strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Démo API REST MindAudit</h1>
            <p>Cette page web utilise ton API REST pour afficher les données</p>
            <div class="status" id="apiStatus">
                ⏳ Vérification...
            </div>
        </div>
        
        <div class="grid">
            <!-- Test Ping -->
            <div class="card">
                <h2>🧪 Test de Connexion</h2>
                <p>Vérifie si l'API est accessible</p>
                <button class="btn" onclick="testPing()">Tester l'API</button>
                <div class="result" id="pingResult"></div>
            </div>
            
            <!-- Authentification -->
            <div class="card">
                <h2>🔐 Authentification</h2>
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" value="admin@example.com" placeholder="admin@example.com">
                </div>
                <div class="input-group">
                    <label>Mot de passe:</label>
                    <input type="password" id="loginPassword" value="admin123" placeholder="Mot de passe">
                </div>
                <button class="btn" onclick="login()">Se Connecter</button>
                <div class="result" id="loginResult"></div>
            </div>
            
            <!-- Statistiques -->
            <div class="card">
                <h2>📊 Statistiques</h2>
                <p>Récupère les statistiques du système</p>
                <button class="btn" onclick="getStats()">Charger les Stats</button>
                <div id="statsDisplay"></div>
            </div>
            
            <!-- Liste des utilisateurs -->
            <div class="card">
                <h2>👥 Liste des Utilisateurs</h2>
                <p>Affiche tous les utilisateurs</p>
                <button class="btn" onclick="getUsers()">Charger les Utilisateurs</button>
                <div class="result user-list" id="usersResult"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:9000';
        let authToken = null;
        
        // Vérifier l'état de l'API au chargement
        window.onload = function() {
            checkApiStatus();
        };
        
        async function checkApiStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch(`${API_URL}/api/ping`);
                const data = await response.json();
                
                if (data.success) {
                    statusEl.className = 'status online';
                    statusEl.innerHTML = '✅ API en ligne';
                } else {
                    statusEl.className = 'status offline';
                    statusEl.innerHTML = '❌ API hors ligne';
                }
            } catch (error) {
                statusEl.className = 'status offline';
                statusEl.innerHTML = '❌ API non accessible';
            }
        }
        
        async function testPing() {
            const resultEl = document.getElementById('pingResult');
            resultEl.innerHTML = '⏳ Test en cours...';
            
            try {
                const response = await fetch(`${API_URL}/api/ping`);
                const data = await response.json();
                
                resultEl.innerHTML = `
                    <div class="success">✅ Connexion réussie!</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultEl.innerHTML = `
                    <div class="error">❌ Erreur de connexion</div>
                    <p>${error.message}</p>
                    <p><strong>Solution:</strong> Assure-toi que ton application JavaFX est lancée!</p>
                `;
            }
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const resultEl = document.getElementById('loginResult');
            
            resultEl.innerHTML = '⏳ Connexion en cours...';
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    resultEl.innerHTML = `
                        <div class="success">✅ Connexion réussie!</div>
                        <p><strong>Utilisateur:</strong> ${data.data.user.nom}</p>
                        <p><strong>Email:</strong> ${data.data.user.email}</p>
                        <p><strong>Rôle:</strong> ${data.data.user.role}</p>
                        <p><strong>Token:</strong> ${authToken.substring(0, 20)}...</p>
                    `;
                } else {
                    resultEl.innerHTML = `
                        <div class="error">❌ ${data.message}</div>
                    `;
                }
            } catch (error) {
                resultEl.innerHTML = `
                    <div class="error">❌ Erreur: ${error.message}</div>
                `;
            }
        }
        
        async function getStats() {
            const displayEl = document.getElementById('statsDisplay');
            displayEl.innerHTML = '⏳ Chargement...';
            
            try {
                const response = await fetch(`${API_URL}/api/stats/all`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    displayEl.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="number">${stats.total}</div>
                                <div class="label">Total Utilisateurs</div>
                            </div>
                            <div class="stat-box">
                                <div class="number">${stats.active}</div>
                                <div class="label">Actifs</div>
                            </div>
                            <div class="stat-box">
                                <div class="number">${stats.inactive}</div>
                                <div class="label">Inactifs</div>
                            </div>
                            <div class="stat-box">
                                <div class="number">${Object.keys(stats.roles).length}</div>
                                <div class="label">Rôles</div>
                            </div>
                        </div>
                        <div class="result" style="margin-top: 15px;">
                            <strong>Détails des rôles:</strong>
                            <pre>${JSON.stringify(stats.roles, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    displayEl.innerHTML = `<div class="error">❌ ${data.message}</div>`;
                }
            } catch (error) {
                displayEl.innerHTML = `<div class="error">❌ Erreur: ${error.message}</div>`;
            }
        }
        
        async function getUsers() {
            const resultEl = document.getElementById('usersResult');
            resultEl.innerHTML = '⏳ Chargement des utilisateurs...';
            
            try {
                const response = await fetch(`${API_URL}/api/users`);
                const data = await response.json();
                
                if (data.success) {
                    const users = data.data;
                    
                    if (users.length === 0) {
                        resultEl.innerHTML = '<p>Aucun utilisateur trouvé</p>';
                        return;
                    }
                    
                    let html = `<div class="success">✅ ${users.length} utilisateur(s) trouvé(s)</div>`;
                    
                    users.forEach(user => {
                        html += `
                            <div class="user-item">
                                <strong>${user.nom}</strong><br>
                                📧 ${user.email}<br>
                                🎂 ${user.age} ans<br>
                                👤 Rôle: ${user.role}<br>
                                ${user.telephone ? '📱 ' + user.telephone + '<br>' : ''}
                                ${user.actif ? '✅ Actif' : '❌ Inactif'}
                            </div>
                        `;
                    });
                    
                    resultEl.innerHTML = html;
                } else {
                    resultEl.innerHTML = `<div class="error">❌ ${data.message}</div>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<div class="error">❌ Erreur: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
